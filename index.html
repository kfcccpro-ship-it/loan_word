<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여신(與信) 핵심 용어 해설</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
/* ===== ROOT SCALE ===== */
html { font-size: calc(24 / 1080 * 100vh); }

/* ===== CSS VARIABLES ===== */
:root {
  --bg-white:     #FFFFFF;
  --bg-gray-50:   #F9FAFB;
  --bg-gray-100:  #F2F4F6;
  --text-primary:   #191F28;
  --text-secondary: #4E5968;
  --text-tertiary:  #8B95A1;
  --border-default: #E5E8EB;
  --blue-primary: #3182F6;
  --blue-dark:    #1B64DA;
  --blue-soft:    #EBF4FF;
  --dark-accent:  #202632;
  --red-soft:     #FFF1F0;
  --red-strong:   #F04452;
  --green-soft:   #E8FAF0;
  --green-strong: #0AC282;
  --amber-soft:   #FFF8E1;
  --amber-strong: #F5A623;
  --radius-sm: 0.5rem;
  --radius-md: 0.75rem;
  --radius-lg: 1.25rem;
  --shadow-card:  0 0.125rem 0.5rem rgba(25,31,40,0.06), 0 0.0625rem 0.125rem rgba(25,31,40,0.04);
  --shadow-float: 0 0.75rem 2rem rgba(25,31,40,0.12);
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0E1116; overflow:hidden; }

/* ===== STAGE & APP ===== */
#stage { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
#app { width:100vw; height:100vh; overflow:hidden; position:relative; background:var(--bg-gray-50); }

/* ===== SLIDE ===== */
.slide {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  background:var(--bg-gray-50);
  opacity:0; pointer-events:none;
  transition:opacity 0.08s;
  overflow:hidden;
}
.slide.active { opacity:1; pointer-events:all; }
.slide.center-content { align-items:center; justify-content:center; }

/* ===== SLIDE INNER ===== */
.slide-inner {
  padding: 3.25rem 5.25rem 1.75rem;
  flex:1;
  display:flex; flex-direction:column;
  min-height:0;
  transform-origin: top center;
}
.slide-inner.vcenter {
  justify-content:center;
  transform-origin: center center;
}

/* ===== PROGRESS BAR ===== */
.progress-wrap {
  position:absolute; top:0; left:0; right:0; height:0.25rem;
  background:var(--border-default); z-index:10;
}
.progress-bar {
  height:100%; background:var(--blue-primary);
  transition:width 0.35s ease;
  box-shadow: 0 0 12px rgba(49,130,246,0.6);
}

/* ===== NAV BAR ===== */
.nav-bar {
  position:absolute; bottom:0; left:0; right:0;
  height:3.75rem;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 1.5rem;
  background:rgba(249,250,251,0.92);
  backdrop-filter:blur(8px);
  border-top:1px solid var(--border-default);
  z-index:20;
}
.nav-btn {
  width:2.75rem; height:2.75rem; border-radius:50%;
  border:none; cursor:pointer;
  font-size:1.5rem; font-weight:700;
  background:var(--bg-gray-100); color:var(--text-secondary);
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
  font-family:'Pretendard',sans-serif;
}
.nav-btn:hover { background:var(--blue-soft); color:var(--blue-primary); }
.nav-btn.primary { background:var(--blue-primary); color:#fff; }
.nav-btn.primary:hover { background:var(--blue-dark); }
.nav-mid { display:flex; flex-direction:column; align-items:center; gap:0.2rem; cursor:pointer; }
.nav-counter { font-size:0.875rem; font-weight:700; color:var(--text-primary); }
.nav-section-name { font-size:0.75rem; color:var(--text-tertiary); max-width:20rem; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ===== TOC ===== */
.toc-overlay {
  position:absolute; inset:0; z-index:50;
  background:rgba(25,31,40,0.45);
  display:none; align-items:flex-end;
}
.toc-overlay.open { display:flex; }
.toc-sheet {
  width:100%; max-height:72vh;
  background:#fff; border-radius:1.5rem 1.5rem 0 0;
  padding:1.5rem 3rem 2.5rem;
  overflow-y:auto;
  box-shadow: 0 -0.5rem 2rem rgba(25,31,40,0.18);
}
.toc-handle { width:2.5rem; height:0.25rem; border-radius:2px; background:var(--border-default); margin:0 auto 1.25rem; }
.toc-title { font-size:1.25rem; font-weight:800; color:var(--text-primary); margin-bottom:1.25rem; }
#tocList { display:grid; grid-template-columns:repeat(3,1fr); gap:0.5rem; }
.toc-item {
  padding:0.625rem 0.875rem; border-radius:var(--radius-md);
  background:var(--bg-gray-50); border:1px solid var(--border-default);
  cursor:pointer; font-size:0.8125rem; color:var(--text-secondary);
  transition:all 0.15s; line-height:1.4;
}
.toc-item:hover { background:var(--blue-soft); color:var(--blue-primary); border-color:var(--blue-primary); }
.toc-item.active { background:var(--blue-primary); color:#fff; border-color:var(--blue-primary); font-weight:700; }

/* ===== TYPOGRAPHY ===== */
.h1 { font-size:4rem; font-weight:800; line-height:1.22; letter-spacing:-0.0625rem; color:var(--text-primary); }
.h2 { font-size:2.625rem; font-weight:700; line-height:1.35; letter-spacing:-0.0312rem; color:var(--text-primary); }
.h3 { font-size:2rem; font-weight:700; line-height:1.4; color:var(--text-primary); }
.body-text { font-size:1.75rem; line-height:1.6; color:var(--text-secondary); }
.small-text { font-size:1.375rem; line-height:1.55; color:var(--text-tertiary); }
.accent { color:var(--blue-primary); font-weight:800; }

.eyebrow {
  font-size:1.125rem; font-weight:800; letter-spacing:0.0625rem;
  color:var(--blue-primary); text-transform:uppercase; margin-bottom:0.75rem;
}

/* ===== CARD ===== */
.card {
  background:#fff; border-radius:var(--radius-lg);
  padding:2rem 2.25rem;
  box-shadow:var(--shadow-card);
  margin-bottom:1.25rem;
}
.card-flat {
  background:var(--bg-gray-100); border-radius:var(--radius-lg);
  padding:1.75rem 2.25rem; margin-bottom:1.25rem;
}

/* ===== BADGE ===== */
.badge {
  display:inline-flex; align-items:center; gap:0.25rem;
  padding:0.375rem 0.875rem; border-radius:2rem;
  font-size:1rem; font-weight:700; margin-bottom:1.25rem;
}
.badge-blue { background:var(--blue-soft); color:var(--blue-primary); }
.badge-red  { background:var(--red-soft);  color:var(--red-strong); }
.badge-green{ background:var(--green-soft);color:var(--green-strong); }
.badge-amber{ background:var(--amber-soft);color:var(--amber-strong); }
.badge-gray { background:var(--bg-gray-100);color:var(--text-secondary); }

/* ===== TERM CARD ===== */
.term-card {
  display:flex; gap:1.25rem; align-items:flex-start;
  padding:1.5rem 1.75rem; border-radius:var(--radius-lg);
  background:#fff; box-shadow:var(--shadow-card);
  margin-bottom:1rem;
}
.term-icon { font-size:2.25rem; line-height:1; flex-shrink:0; }
.term-name { font-size:1.625rem; font-weight:800; color:var(--text-primary); margin-bottom:0.375rem; }
.term-desc { font-size:1.375rem; color:var(--text-secondary); line-height:1.55; }

/* ===== KEY LINE ===== */
.key-line {
  background:var(--dark-accent); color:#fff;
  border-radius:1.75rem; padding:2.5rem 2.75rem;
  font-size:1.875rem; font-weight:700; line-height:1.55;
  position:relative; overflow:hidden; margin-top:1rem;
}
.key-line .label {
  display:inline-block; font-size:1.1875rem; font-weight:800;
  color:#9DC4FF; margin-bottom:0.75rem; letter-spacing:0.03125rem;
}
.key-line .quote-mark {
  position:absolute; right:1.125rem; top:0.375rem;
  font-size:5rem; color:rgba(255,255,255,0.08);
  font-family:Georgia,serif; line-height:1;
}

/* ===== WARN / OK BOX ===== */
.warn-box {
  background:var(--red-soft); border-radius:var(--radius-lg);
  padding:1.5rem 1.75rem; border-left:0.25rem solid var(--red-strong);
  margin-bottom:1rem;
}
.warn-title { font-size:1.375rem; font-weight:800; color:var(--red-strong); margin-bottom:0.5rem; }
.ok-box {
  background:var(--green-soft); border-radius:var(--radius-lg);
  padding:1.5rem 1.75rem; border-left:0.25rem solid var(--green-strong);
  margin-bottom:1rem;
}
.ok-title { font-size:1.375rem; font-weight:800; color:var(--green-strong); margin-bottom:0.5rem; }

/* ===== CHECK ITEM ===== */
.check-item {
  display:flex; gap:1rem; align-items:flex-start;
  padding:1rem 0; border-bottom:1px solid var(--border-default);
}
.check-item:last-child { border-bottom:none; }
.check-num {
  min-width:2rem; height:2rem; border-radius:50%;
  background:var(--blue-primary); color:#fff;
  font-size:1rem; font-weight:800;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  margin-top:0.125rem;
}
.check-text { font-size:1.5rem; color:var(--text-secondary); line-height:1.5; }

/* ===== TABLE ===== */
.table-scroll { overflow-x:auto; }
.cmp-table { width:100%; border-collapse:collapse; font-size:1.375rem; }
.cmp-table th {
  background:var(--bg-gray-100); color:var(--text-primary);
  font-weight:800; padding:0.875rem 1.125rem;
  border:1px solid var(--border-default); text-align:left;
}
.cmp-table td {
  padding:0.875rem 1.125rem; border:1px solid var(--border-default);
  color:var(--text-secondary); vertical-align:top; line-height:1.45;
}
.cmp-table tr:nth-child(even) td { background:var(--bg-gray-50); }

/* ===== OX QUIZ ===== */
.ox-row {
  display:flex; gap:1.5rem; justify-content:center;
  margin-top:1.75rem;
}
.ox-btn {
  width:9rem; height:9rem; border-radius:50%; border:none;
  font-size:4.5rem; cursor:pointer; font-weight:900;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; box-shadow:var(--shadow-float);
  font-family:'Pretendard',sans-serif;
}
.ox-btn.o-btn { background:#E8FAF0; color:var(--green-strong); }
.ox-btn.x-btn { background:var(--red-soft); color:var(--red-strong); }
.ox-btn:hover { transform:scale(1.06); }
.ox-btn.correct { animation:btnBounce 0.45s ease; }
.ox-btn.wrong   { animation:shake 0.4s ease; }
.ox-btn.correct.o-btn { background:var(--green-strong); color:#fff; }
.ox-btn.correct.x-btn { background:var(--red-strong); color:#fff; }
.ox-btn.wrong   { opacity:0.35; }

.quiz-feedback {
  display:none; margin-top:1.5rem; text-align:center;
  padding:1.25rem 2rem; border-radius:var(--radius-lg);
  font-size:1.5rem; font-weight:700; line-height:1.5;
}
.quiz-feedback.show { display:block; }
.quiz-feedback.correct-fb { background:var(--green-soft); color:var(--green-strong); }
.quiz-feedback.wrong-fb   { background:var(--red-soft);   color:var(--red-strong); }

.quiz-q-card {
  background:#fff; border-radius:var(--radius-lg);
  padding:3rem 2.5rem; text-align:center;
  box-shadow:var(--shadow-card); margin:1.25rem 0;
  font-size:2rem; font-weight:700; color:var(--text-primary);
  line-height:1.5;
}

/* ===== CASE COVER ===== */
.case-cover {
  height:100%; display:flex; flex-direction:column;
  justify-content:center; align-items:center; text-align:center;
  padding:3rem 3.5rem; position:relative; overflow:hidden;
}
.case-num-huge {
  font-size:13.75rem; font-weight:900; color:var(--blue-primary);
  line-height:1; letter-spacing:-0.05em;
}
.case-tag {
  font-size:1.625rem; font-weight:800; color:var(--blue-primary);
  letter-spacing:0.25rem; margin-bottom:1.75rem;
}
.case-title {
  font-size:4.75rem; font-weight:800; line-height:1.28;
  color:var(--text-primary); margin-bottom:1.75rem;
}
.case-meta {
  font-size:1.375rem; color:var(--text-tertiary);
  background:var(--bg-white); padding:1.125rem 2.125rem;
  border-radius:1.875rem; box-shadow:var(--shadow-card);
}
.case-progress-dots { display:flex; gap:0.375rem; justify-content:center; margin-top:1.5rem; }
.case-progress-dots span { width:0.5rem; height:0.5rem; border-radius:50%; background:var(--border-default); }
.case-progress-dots span.done { background:var(--blue-primary); }

/* ===== BG DECO ===== */
.bg-deco {
  position:absolute; border-radius:50%;
  pointer-events:none;
}

/* ===== TIMELINE ===== */
.timeline { display:flex; flex-direction:column; gap:1rem; }
.tl-item { display:flex; gap:1rem; align-items:flex-start; }
.tl-dot { min-width:0.75rem; height:0.75rem; border-radius:50%; background:var(--blue-primary); margin-top:0.5rem; flex-shrink:0; }

/* ===== OPTION CARDS ===== */
.option-grid { display:flex; flex-direction:column; gap:0.875rem; }
.option-card {
  display:flex; gap:1.25rem; align-items:flex-start;
  padding:1.375rem 1.625rem; border-radius:var(--radius-lg);
  background:var(--bg-gray-100); border:2px solid transparent;
  transition:all 0.15s;
}
.option-card.best { background:var(--blue-soft); border-color:var(--blue-primary); }
.option-num {
  min-width:2.25rem; height:2.25rem; border-radius:50%;
  background:var(--border-default); color:var(--text-secondary);
  font-size:1.125rem; font-weight:800;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.option-card.best .option-num { background:var(--blue-primary); color:#fff; }

/* ===== REVEAL BTN ===== */
.reveal-btn {
  background:var(--blue-primary); color:#fff;
  border:none; border-radius:var(--radius-md);
  padding:0.875rem 1.75rem; font-size:1.25rem; font-weight:700;
  cursor:pointer; margin-top:1rem;
  font-family:'Pretendard',sans-serif;
  transition:background 0.15s;
}
.reveal-btn:hover { background:var(--blue-dark); }
.answer-panel {
  display:none; margin-top:1rem;
  background:var(--dark-accent); color:#fff;
  border-radius:var(--radius-lg); padding:1.75rem 2rem;
  font-size:1.5rem; line-height:1.6;
}
.answer-panel.show { display:block; }

/* ===== DISCUSS CARD ===== */
.discuss-card {
  background:#fff; border-radius:var(--radius-lg);
  padding:1.75rem 2rem; margin-bottom:1rem;
  box-shadow:var(--shadow-card);
}
.discuss-q { display:flex; gap:1rem; align-items:flex-start; font-size:1.75rem; font-weight:600; color:var(--text-primary); line-height:1.5; }
.discuss-num {
  min-width:2.25rem; height:2.25rem; border-radius:50%;
  background:var(--blue-primary); color:#fff;
  font-size:1.125rem; font-weight:800;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  margin-top:0.125rem;
}

/* ===== COVER (메인 표지) ===== */
.main-cover {
  height:100%; display:flex; flex-direction:column;
  justify-content:center; align-items:center; text-align:center;
  padding:3rem; position:relative; overflow:hidden;
  background: linear-gradient(135deg, #EBF4FF 0%, #F9FAFB 50%, #E8FAF0 100%);
}
.main-cover-tag {
  font-size:1.25rem; font-weight:800; color:var(--blue-primary);
  letter-spacing:0.2rem; margin-bottom:1.5rem;
  background:var(--blue-soft); padding:0.5rem 1.5rem; border-radius:2rem;
}
.main-cover-title {
  font-size:5.5rem; font-weight:900; color:var(--text-primary);
  line-height:1.15; letter-spacing:-0.05rem; margin-bottom:1.5rem;
}
.main-cover-sub { font-size:2rem; color:var(--text-secondary); line-height:1.5; margin-bottom:2.5rem; }
.chapter-grid {
  display:grid; grid-template-columns:repeat(5,1fr); gap:0.75rem;
  margin-top:1rem; width:100%;
}
.chapter-chip {
  background:#fff; border-radius:var(--radius-md);
  padding:0.75rem 0.5rem; text-align:center;
  box-shadow:var(--shadow-card); font-size:0.9rem;
  font-weight:700; color:var(--text-secondary);
}
.chapter-chip span { display:block; font-size:1.25rem; color:var(--blue-primary); font-weight:800; }

/* ===== ANIMATIONS ===== */
@keyframes btnBounce {
  0%   { transform:scale(1); }
  40%  { transform:scale(1.12); }
  70%  { transform:scale(1.04); }
  100% { transform:scale(1); }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-0.5rem); }
  40%     { transform:translateX(0.5rem); }
  60%     { transform:translateX(-0.375rem); }
  80%     { transform:translateX(0.375rem); }
}
@keyframes float {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50%     { transform:translateY(-0.875rem) rotate(4deg); }
}
@keyframes countPop {
  0%   { transform:scale(0.6); opacity:0; }
  70%  { transform:scale(1.08); }
  100% { transform:scale(1);   opacity:1; }
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(1.5rem); }
  to   { opacity:1; transform:translateY(0); }
}
.float { animation:float 4s ease-in-out infinite; }
.pop   { animation:countPop 0.5s cubic-bezier(.34,1.56,.64,1) both; }
.reveal { animation:fadeUp 0.55s cubic-bezier(.22,.61,.36,1) both; }
.r1{animation-delay:.04s} .r2{animation-delay:.10s} .r3{animation-delay:.16s}
.r4{animation-delay:.22s} .r5{animation-delay:.28s} .r6{animation-delay:.34s}
.r7{animation-delay:.40s} .r8{animation-delay:.46s}

/* ===== CONFETTI ===== */
.confetti {
  position:absolute; width:0.625rem; height:0.625rem;
  border-radius:2px; pointer-events:none; z-index:60;
}

/* ===== FORMULA BOX ===== */
.formula-box {
  background:var(--dark-accent); color:#fff;
  border-radius:var(--radius-lg); padding:1.75rem 2.25rem;
  font-size:1.875rem; font-weight:800; text-align:center;
  letter-spacing:0.03rem; margin:1rem 0;
}
.formula-box .formula-label {
  font-size:1rem; font-weight:600; color:#9DC4FF;
  margin-bottom:0.5rem; letter-spacing:0.05rem;
}

/* ===== FLOW ARROW ===== */
.flow-row {
  display:flex; align-items:center; gap:0.75rem;
  flex-wrap:wrap; margin:0.75rem 0;
}
.flow-item {
  background:#fff; border:1px solid var(--border-default);
  border-radius:var(--radius-md); padding:0.75rem 1.25rem;
  font-size:1.375rem; font-weight:700; color:var(--text-primary);
  box-shadow:var(--shadow-card);
}
.flow-arrow { font-size:1.5rem; color:var(--blue-primary); font-weight:900; }

/* ===== GAP UTILS ===== */
.mt1 { margin-top:1rem; }
.mt2 { margin-top:2rem; }
.mb1 { margin-bottom:1rem; }
.mb2 { margin-bottom:2rem; }
.gap-row { display:flex; gap:1.25rem; }
.col2 { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }

/* ===== COVER CHAPTER SECTION ===== */
.section-cover {
  background: linear-gradient(135deg, var(--blue-soft) 0%, #fff 100%);
}


/* ===== MZ ACTIVE EFFECTS / SPOTLIGHT-FRIENDLY ===== */
.slide.active { animation:slideIgnite .38s cubic-bezier(.2,.8,.2,1); }
.slide::after {
  content:""; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(circle at 18% 12%, rgba(49,130,246,.08), transparent 28%),
    radial-gradient(circle at 84% 20%, rgba(10,194,130,.08), transparent 26%),
    radial-gradient(circle at 78% 78%, rgba(245,166,35,.08), transparent 28%);
  opacity:.7; mix-blend-mode:multiply;
}
.main-cover::before, .case-cover::before {
  content:""; position:absolute; inset:-30%; pointer-events:none;
  background:conic-gradient(from 180deg, rgba(49,130,246,.18), rgba(10,194,130,.14), rgba(245,166,35,.16), rgba(240,68,82,.12), rgba(49,130,246,.18));
  filter:blur(4rem); opacity:.58; animation:auroraSpin 16s linear infinite;
}
.main-cover > *, .case-cover > * { position:relative; z-index:1; }
.card, .term-card, .quiz-q-card, .key-line { position:relative; overflow:hidden; }
.card::before, .term-card::before, .quiz-q-card::before {
  content:""; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(115deg, transparent 0%, rgba(255,255,255,.0) 34%, rgba(255,255,255,.55) 50%, rgba(255,255,255,0) 66%, transparent 100%);
  transform:translateX(-115%); animation:shinePass 5.2s ease-in-out infinite;
}
.term-icon { filter:drop-shadow(0 .25rem .65rem rgba(49,130,246,.18)); animation:iconBob 3.4s ease-in-out infinite; }
.term-card:hover, .card:hover { transform:translateY(-.18rem); box-shadow:0 1rem 2.5rem rgba(25,31,40,.14); }
.case-num-huge { text-shadow:0 0 1rem rgba(49,130,246,.22), 0 .75rem 2rem rgba(49,130,246,.12); }
.progress-bar::after {
  content:""; display:block; height:100%; width:7rem; margin-left:auto;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.82), transparent);
  animation:progressComet 1.35s linear infinite;
}

// OX 복습퀴즈 헬퍼 — 챕터 용어 학습 후 배치
function addCaseQuiz(caseNum) {
  const qs = OX_QUIZ.filter(q => q.c === caseNum);
  const chRoman = ['','I','II','III','IV','V','VI','VII','VIII','IX','X'][caseNum];
  const chNames = ['','여신 기초개념','대출 분류·상환방법','금리 체계','담보 기초','보증 기초','채무관계자','여신 절차','사후관리','신용평가','기업여신'];
  const emojis  = ['','🧠','💸','📉','🏠','🤝','👥','🧾','🚨','🔢','🏭'];

  // 복습 인트로 슬라이드
  addSlide(`Ch.${chRoman} OX 복습`, `
<div class="slide-inner vcenter">
  <div style="font-size:4.5rem;text-align:center;margin-bottom:1rem;">${emojis[caseNum]}</div>
  <div class="reveal r1 eyebrow" style="text-align:center;">✅ OX 복습 퀴즈</div>
  <div class="reveal r2 h1" style="text-align:center;margin-bottom:1rem;">${chNames[caseNum]}</div>
  <div class="reveal r3 body-text" style="text-align:center;margin-bottom:1.5rem;">
    방금 배운 내용으로 5문항을 풀어봅니다 — 얼마나 이해했는지 확인해보세요
  </div>
  <div class="reveal r4 key-line">
    <span class="quote-mark">"</span>
    <span class="label">📌 복습 포인트</span>
    틀린 문항은 <b style="color:#9DC4FF;">앞 슬라이드로 되돌아가</b> 다시 확인하세요.
  </div>
</div>
`);

  // OX 문항 슬라이드
  qs.forEach((q, i) => {
    const globalIdx = OX_QUIZ.indexOf(q);
    addSlide(`Ch.${chRoman} OX ${i+1}/${qs.length}`, `
<div class="slide-inner vcenter">
  <div style="text-align:center;margin-bottom:1rem;">
    <span class="badge badge-blue">Ch.${chRoman}</span>
    <span class="badge badge-green" style="margin-left:0.5rem;">복습 OX ${i+1} / ${qs.length}</span>
  </div>
  <div class="reveal r2 quiz-q-card">${q.q}</div>
  <div class="reveal r3 ox-row">
    <button class="ox-btn o-btn" onclick="answerOX(${globalIdx}, true)">O</button>
    <button class="ox-btn x-btn" onclick="answerOX(${globalIdx}, false)">X</button>
  </div>
  <div class="quiz-feedback" id="fb-${globalIdx}"></div>
</div>
`);
  });
}

// =================== APP ENGINE ===================
appEl = document.getElementById('app');
const totalSlides = SLIDES.length;
let currentIdx = 0;

let slideEls = [];
let built = false;

function buildSlidesOnce() {
  const progressWrap = appEl.querySelector('.progress-wrap');
  SLIDES.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide';
    div.innerHTML = s.html;
    appEl.insertBefore(div, progressWrap);
    slideEls.push(div);
  });
  built = true;
}

function render() {
  if (!built) buildSlidesOnce();

  slideEls.forEach((el, i) => {
    if (i === currentIdx) el.classList.add('active');
    else el.classList.remove('active');
  });

  document.getElementById('progressBar').style.width = ((currentIdx + 1) / totalSlides * 100) + '%';
  document.getElementById('navCounter').textContent = (currentIdx + 1) + ' / ' + totalSlides;
  document.getElementById('navSection').textContent = SLIDES[currentIdx].section;

  buildToc();

  const active = slideEls[currentIdx];
  if (active) {
    activeSlide = active;
    // reveal 애니메이션 재생: r클래스 재적용
    active.querySelectorAll('.reveal').forEach(r => {
      r.style.animation = 'none';
      void r.offsetWidth;
      r.style.animation = '';
    });
    setTimeout(() => { fitActive(active); triggerSlideEnergy(active); }, 60);
  }
}

function buildToc() {
  const tocList = document.getElementById('tocList');
  tocList.innerHTML = '';
  SLIDES.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'toc-item' + (i === currentIdx ? ' active' : '');
    div.textContent = (i + 1) + '. ' + s.section;
    div.onclick = () => { goTo(i); closeToc(); };
    tocList.appendChild(div);
  });
}

function fitActive(el) {
  el.scrollTop = 0;
  appEl.scrollTop = 0;
  const inner = el.querySelector('.slide-inner, .case-cover');
  if (!inner) return;
  inner.style.transform = '';
  if (inner.classList.contains('case-cover')) return;
  const prevFlex = inner.style.flex;
  const prevAlignSelf = inner.style.alignSelf;
  const prevHeight = inner.style.height;
  inner.style.flex = '0 0 auto';
  inner.style.alignSelf = 'flex-start';
  inner.style.height = 'auto';
  const avail = el.clientHeight - 150;
  const needed = inner.scrollHeight;
  const isVcenter = inner.classList.contains('vcenter');
  if (needed > avail) {
    if (!isVcenter) {
      inner.style.flex = prevFlex;
      inner.style.alignSelf = prevAlignSelf;
      inner.style.height = prevHeight;
      el.classList.remove('center-content');
    } else {
      el.classList.add('center-content');
    }
    const scale = Math.max(0.62, avail / needed);
    inner.style.transformOrigin = isVcenter ? 'center center' : 'top center';
    inner.style.transform = 'scale(' + scale + ')';
  } else {
    inner.style.flex = prevFlex;
    inner.style.alignSelf = prevAlignSelf;
    inner.style.height = prevHeight;
    if (needed < avail * 0.97) {
      el.classList.add('center-content');
    } else {
      el.classList.remove('center-content');
    }
  }
}

function goTo(idx) {
  if (idx < 0 || idx >= totalSlides) return;
  currentIdx = idx;
  render();
}
function next() { goTo(currentIdx + 1); }
function prev() { goTo(currentIdx - 1); }

// OX 인터랙션
window.answerOX = function(globalIdx, userAnswer) {
  if (quizAnswered[globalIdx]) return;
  quizAnswered[globalIdx] = true;

  const q = OX_QUIZ[globalIdx];
  const isCorrect = (userAnswer === q.a);
  const activeEl = appEl.querySelector('.slide.active');
  if (!activeEl) return;

  const oBtn = activeEl.querySelector('.o-btn');
  const xBtn = activeEl.querySelector('.x-btn');
  const fb   = activeEl.querySelector('#fb-' + globalIdx);

  const clickedBtn = userAnswer ? oBtn : xBtn;
  const otherBtn   = userAnswer ? xBtn : oBtn;

  if (isCorrect) {
    clickedBtn.classList.add('correct');
    spawnConfetti();
    emojiBurst(['🎯','🔥','👏','✨','💯']);
  } else {
    emojiBurst(['💡','↩️','👀','📌','다시']);
    clickedBtn.classList.add('wrong');
    otherBtn.classList.add('correct');
  }
  otherBtn.style.opacity = isCorrect ? '0.35' : '';

  if (fb) {
    fb.textContent = (isCorrect ? '✅ 정답! ' : '❌ 오답! ') + q.exp;
    fb.className = 'quiz-feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  }

  if (document.activeElement?.blur) document.activeElement.blur();
  setTimeout(() => {
    if (activeEl) activeEl.scrollTop = 0;
    appEl.scrollTop = 0;
    fitActive(activeEl);
  }, 30);
};

window.toggleAnswer = function(id) {
  const panel = document.getElementById(id);
  if (!panel) return;
  panel.classList.toggle('show');
  if (document.activeElement?.blur) document.activeElement.blur();
  const activeEl = appEl.querySelector('.slide.active');
  setTimeout(() => {
    if (activeEl) activeEl.scrollTop = 0;
    appEl.scrollTop = 0;
    fitActive(activeEl);
  }, 30);
};

// KEYBOARD
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  switch(e.key) {
    case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); next(); break;
    case 'ArrowLeft': case 'Backspace': case 'PageUp': e.preventDefault(); prev(); break;
    case 'Escape': closeToc(); break;
    case 't': case 'T': document.getElementById('tocOverlay').classList.toggle('open'); break;
    case 'b': case 'B': toggleBlackout(); break;
    case 'Home': goTo(0); break;
    case 'End': goTo(totalSlides-1); break;
    case 'f': case 'F': toggleFullscreen(); break;
  }
});

appEl.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
appEl.addEventListener('touchend', e => {
  const dx = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(dx) > 50) { dx > 0 ? next() : prev(); }
});

// FULLSCREEN
function toggleFullscreen() {
  const docEl = document.documentElement;
  if (!document.fullscreenElement) {
    (docEl.requestFullscreen || docEl.webkitRequestFullscreen)?.call(docEl);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
  }
}
appEl.addEventListener('dblclick', e => {
  if (!e.target.closest('button')) toggleFullscreen();
});

// RESIZE
window.addEventListener('resize', () => {
  const activeEl = appEl.querySelector('.slide.active');
  if (activeEl) fitActive(activeEl);
});

// INIT
createPresentationEffects();
render();
</script>
</body>
</html>
